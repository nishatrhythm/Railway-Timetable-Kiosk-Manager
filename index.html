<!DOCTYPE html>
<html lang="bn" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>ঢাকা রেলওয়ে স্টেশন - ট্রেন সময়সূচী</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #050a05;
      overflow: auto;
      font-family: 'Noto Serif Bengali', serif;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      touch-action: pan-x pan-y;
    }

    .board {
      width: 100vw;
      min-width: 1280px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #050a05;
      padding: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      background: #0b180b;
      border: 2px solid #1e5c1e;
      padding: 10px 20px;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo-wrap {
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 18px;
      padding: 8px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.55);
    }

    .logo-wrap img {
      display: block;
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .title-block {
      flex: 1;
      text-align: center;
    }
    .title-main {
      color: #00e87a;
      font-size: clamp(18px, 2.4vw, 34px);
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 0 12px #00cc6680;
    }
    .title-sub {
      color: #88f0b8;
      font-size: clamp(13px, 1.4vw, 20px);
      font-weight: 400;
      margin-top: 4px;
    }

    .clock-block {
      text-align: right;
      flex-shrink: 0;
      min-width: 160px;
    }
    #board-date {
      color: #ff2200;
      font-size: clamp(18px, 2vw, 32px);
      font-weight: 800;
      letter-spacing: 1px;
    }
    #board-time {
      color: #ff2200;
      font-size: clamp(18px, 2vw, 32px);
      font-weight: 800;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 10px #ff220060;
    }

    .table-wrap {
      flex: 1;
      overflow: hidden;
      margin-top: 8px;
      border: 2px solid #1e5c1e;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .col-headers {
      display: grid;
      grid-template-columns: 10% 25% 12% 20% 15% 18%;
      background: #005c2a;
      border-bottom: 2px solid #1e5c1e;
      flex-shrink: 0;
    }
    .col-header {
      color: #00ffaa;
      font-size: clamp(13px, 1.5vw, 22px);
      font-weight: 700;
      text-align: center;
      padding: clamp(8px, 1vh, 14px) 6px;
      border-right: 1px solid #1a5a2a;
    }
    .col-header:last-child { border-right: none; }

    .rows-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .train-row {
      display: grid;
      grid-template-columns: 10% 25% 12% 20% 15% 18%;
      flex: 1;
      border-bottom: 1px solid #162816;
      align-items: center;
      transition: background 0.3s;
    }
    .train-row:nth-child(odd)  { background: #0b130b; }
    .train-row:nth-child(even) { background: #0e180e; }
    .train-row:last-child { border-bottom: none; }

    .train-row.is-separator {
      visibility: hidden;
      pointer-events: none;
    }

    .cell {
      text-align: center;
      padding: 0 6px;
      border-right: 1px solid #162816;
      font-size: clamp(13px, 1.55vw, 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cell:last-child { border-right: none; }

    .cell-num  { color: #ffee44; font-weight: 700; }
    .cell-name { text-align: center; padding-left: 6px; color: #ffffff; font-weight: 600; }
    .cell-plat { color: #ccffcc; font-weight: 600; }
    .cell-dest { color: #66ddff; font-weight: 700; }
    .cell-time { color: #ffcc00; font-weight: 800; letter-spacing: 1px; }
    .cell-eve  { color: #ffcc00; font-weight: 800; letter-spacing: 1px; }

    .board::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 900px) {
      .header {
        padding: 8px 12px;
        gap: 10px;
      }

      .logo-wrap {
        padding: 6px;
        border-radius: 14px;
      }

      .logo-wrap img {
        width: 56px;
        height: 56px;
      }

      .title-main {
        font-size: 16px;
      }

      .title-sub {
        font-size: 11px;
      }

      #board-date,
      #board-time {
        font-size: 14px;
      }

      .col-header {
        font-size: 11px;
        padding: 6px 4px;
      }

      .cell {
        padding: 0 4px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body translate="no" class="notranslate">

<div class="board">

  <div class="header">

    <div class="logo-wrap">
      <img src="https://eticket.railway.gov.bd/assets/img/home/bangladesh-railway.png" alt="Bangladesh Railway">
    </div>

    <div class="title-block">
      <div class="title-main">ঢাকা রেলওয়ে স্টেশনে আপনাকে স্বাগতম</div>
      <div class="title-sub">ঢাকা থেকে ট্রেন ছাড়ার সময়সূচী</div>
    </div>

    <div class="clock-block">
      <div id="board-date"></div>
      <div id="board-time"></div>
    </div>

  </div>

  <div class="table-wrap">

    <div class="col-headers">
      <div class="col-header">ট্রেন নং</div>
      <div class="col-header">ট্রেনের নাম</div>
      <div class="col-header">প্লাটফর্ম নং</div>
      <div class="col-header">গন্তব্য</div>
      <div class="col-header">ছাড়ার সময়</div>
      <div class="col-header">সম্ভাব্য সময়</div>
    </div>

    <div class="rows-container" id="rows-container"></div>
    </div>
  </div>

</div>

<script>
  function toBn(n) {
    return String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  }

  function updateClock() {
    const now = new Date();
    const dd  = String(now.getDate()).padStart(2, '0');
    const mm  = String(now.getMonth() + 1).padStart(2, '0');
    const yy  = String(now.getFullYear()).slice(2);
    const hh  = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const ss  = String(now.getSeconds()).padStart(2, '0');

    document.getElementById('board-date').textContent =
      toBn(dd) + '/' + toBn(mm) + '/' + toBn(yy);
    document.getElementById('board-time').textContent =
      toBn(hh) + ':' + toBn(min) + ':' + toBn(ss);
  }

  updateClock();
  setInterval(updateClock, 1000);

  function buildRow(train) {
    const row = document.createElement('div');
    row.className = 'train-row';
    row.innerHTML = `
      <div class="cell cell-num">${train.number || '&nbsp;'}</div>
      <div class="cell cell-name">${train.name || '&nbsp;'}</div>
      <div class="cell cell-plat">${train.platform || '&nbsp;'}</div>
      <div class="cell cell-dest">${train.destination || '&nbsp;'}</div>
      <div class="cell cell-time">${train.departure || '&nbsp;'}</div>
      <div class="cell cell-eve">${train.expected || '&nbsp;'}</div>
    `;
    return row;
  }

  async function loadTrainData() {
    try {
      const response = await fetch('data.json', { cache: 'no-store' });
      if (!response.ok) throw new Error('Failed to load data.json');
      return await response.json();
    } catch (error) {
      console.error(error);
      return [];
    }
  }

  async function renderRows() {
    const container = document.getElementById('rows-container');
    const data = await loadTrainData();
    container.innerHTML = '';
    data.slice(0, 9).forEach(train => container.appendChild(buildRow(train)));
    fitRows();
  }

  function fitRows() {
    const container = document.getElementById('rows-container');
    const rows = container.querySelectorAll('.train-row');
    const containerH = container.clientHeight;
    const visibleRowCount = Math.min(rows.length, 9);
    const maxRowH = window.innerWidth <= 900 ? 56 : Infinity;
    const rowH = Math.min(Math.floor(containerH / visibleRowCount), maxRowH);
    rows.forEach(r => r.style.height = rowH + 'px');
  }

  renderRows();
  window.addEventListener('resize', fitRows);

  document.addEventListener('contextmenu', event => event.preventDefault());
  document.addEventListener('selectstart', event => event.preventDefault());
  document.addEventListener('dragstart', event => event.preventDefault());
</script>

</body>
</html>
